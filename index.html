  <!-- Immediate Lottie Player execution -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js" crossorigin="anonymous"></script>
  <script>
    window.__sequenceLoader = {
      total: 0,
      loaded: 0,
      isComplete: false,
      registerImages: function(count) {
        this.total += count;
      },
      imageLoaded: function() {
        this.loaded++;
        if (window.__onSequenceImageLoaded) {
          window.__onSequenceImageLoaded(this.loaded, this.total);
        }
        if (this.loaded >= this.total && this.total > 0) {
          this.isComplete = true;
        }
      }
    };
    (function() {
      var container = document.getElementById('preloader-lottie');
      var fill = document.getElementById('preloader-fill');
      var anim = null;
      if (container && window.lottie) {
        anim = window.lottie.loadAnimation({
          container: container,
          renderer: 'svg',
          loop: true,
          autoplay: true,
          path: '/assets/animations/pizza-glitch-animation.json',
          rendererSettings: {
            preserveAspectRatio: 'xMidYMid meet'
          }
        });
        window.__preloaderAnim = anim;
      }
      if (fill) {
        requestAnimationFrame(function() {
          fill.style.transition = 'width 4500ms cubic-bezier(0.1, 0.8, 0.25, 1)';
          fill.style.width = '90%';
        });
      }
    })();
  </script>
